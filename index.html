<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Lanka Lap 2026 — Sash Jayasinghe</title>
  <meta name="description" content="On July 1, 2026, I run 1,400km around Sri Lanka's coastline. Follow it from day one." />
  <meta name="google-site-verification" content="PASTE_CODE_HERE" />
  <link rel="sitemap" type="application/xml" href="/lanka-lap-2026/sitemap.xml" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect x='8' y='8' width='16' height='16' rx='1' fill='%238D153A' transform='rotate(45 16 16)'/%3E%3C/svg%3E" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Source+Sans+3:wght@400;600;700&display=swap" rel="stylesheet" />

  <style>
    :root {
      --bg:      #06000A;
      --crimson: #8D153A;
      --saffron: #F5A800;
      --orange:  #E87722;
      --green:   #006533;
      --white:   #F0EBE3;
      --muted:   #5A525A;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--white);
      font-family: 'Source Sans 3', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    /* Flag stripe */
    .flag {
      position: fixed; top: 0; left: 0; right: 0;
      display: flex; height: 3px; z-index: 10;
    }
    .flag span { display: block; }
    .flag span:nth-child(1) { background: var(--green);   flex: 1; }
    .flag span:nth-child(2) { background: var(--orange);  flex: 1; }
    .flag span:nth-child(3) { background: var(--crimson); flex: 5; }
    .flag span:nth-child(4) { background: var(--orange);  flex: 1; }
    .flag span:nth-child(5) { background: var(--green);   flex: 1; }

    /* Page */
    .page {
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 5rem 1.5rem 3rem;
    }

    /* Island */
    .island {
      width: min(100px, 22vw);
      margin-bottom: 2.2rem;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.23,1,0.32,1) 0.2s forwards;
    }

    /* Headline */
    .hl {
      font-family: 'Bebas Neue', sans-serif;
      font-size: clamp(4rem, 18vw, 9rem);
      line-height: 0.85;
      letter-spacing: 0.01em;
      margin-bottom: 1rem;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.23,1,0.32,1) 0.35s forwards;
    }

    /* Sub */
    .sub {
      font-size: clamp(0.95rem, 2.4vw, 1.1rem);
      font-weight: 600;
      color: var(--white);
      line-height: 1.7;
      max-width: 360px;
      margin-bottom: 0.3rem;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.23,1,0.32,1) 0.5s forwards;
    }
    .sub-muted {
      font-size: clamp(0.82rem, 2vw, 0.9rem);
      font-weight: 600;
      color: var(--muted);
      margin-bottom: 0;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.23,1,0.32,1) 0.6s forwards;
    }

    /* Countdown */
    .cd {
      display: flex;
      align-items: baseline;
      justify-content: center;
      gap: 0.3rem;
      margin: 1.6rem 0 2rem;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.23,1,0.32,1) 0.7s forwards;
    }
    .cd-n {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1.4rem;
      color: var(--white);
      min-width: 2.2ch;
      text-align: center;
      font-variant-numeric: tabular-nums;
    }
    .cd-l {
      font-size: 0.36rem;
      font-weight: 700;
      letter-spacing: 0.16em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .cd-dot {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 0.7rem;
      color: var(--crimson);
      opacity: 0.45;
    }

    /* Form */
    .form-wrap {
      width: 100%;
      max-width: 380px;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.23,1,0.32,1) 0.8s forwards;
    }

    .email-row {
      display: flex;
      border: 1px solid rgba(141,21,58,0.5);
      transition: border-color 200ms ease, box-shadow 200ms ease;
    }
    .email-row:focus-within {
      border-color: var(--saffron);
      box-shadow: 0 0 0 3px rgba(245,168,0,0.1);
    }

    .email-input {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--white);
      font-family: 'Source Sans 3', sans-serif;
      font-size: 0.95rem;
      font-weight: 600;
      padding: 0.95rem 1.1rem;
      outline: none;
      cursor: text;
    }
    .email-input::placeholder { color: rgba(240,235,227,0.2); }

    .btn {
      background: var(--crimson);
      border: none;
      color: var(--white);
      font-family: 'Bebas Neue', sans-serif;
      font-size: 1rem;
      letter-spacing: 0.16em;
      padding: 0 1.6rem;
      cursor: pointer;
      white-space: nowrap;
      transition: background 200ms ease, transform 150ms cubic-bezier(0.23,1,0.32,1);
    }
    .btn:hover  { background: #A8193F; }
    .btn:active { transform: scale(0.97); }
    .btn:focus-visible { outline: 2px solid var(--saffron); outline-offset: 2px; }
    .btn:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }

    .form-error {
      font-size: 0.68rem;
      font-weight: 700;
      color: var(--orange);
      min-height: 1rem;
      margin-top: 0.5rem;
      letter-spacing: 0.04em;
    }
    .form-note {
      font-size: 0.62rem;
      font-weight: 600;
      color: var(--muted);
      letter-spacing: 0.06em;
      margin-top: 0.7rem;
    }

    /* Success */
    .success { display: none; }
    .success.show { display: block; }
    .email-row-wrap.hide { display: none; }

    .success-hl {
      font-family: 'Bebas Neue', sans-serif;
      font-size: 2.2rem;
      color: var(--saffron);
      margin-bottom: 0.4rem;
    }
    .success-sub {
      font-size: 0.95rem;
      font-weight: 600;
      color: var(--white);
      line-height: 1.7;
    }

    /* Footer links */
    .links {
      margin-top: 2.2rem;
      display: flex;
      gap: 1.6rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fade-up 0.7s cubic-bezier(0.23,1,0.32,1) 1s forwards;
    }
    .links a {
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      cursor: pointer;
      transition: color 200ms ease;
    }
    .links a:hover { color: var(--saffron); }

    @keyframes fade-up {
      from { opacity: 0; transform: translateY(12px) scale(0.98); }
      to   { opacity: 1; transform: translateY(0)    scale(1); }
    }

    @media (prefers-reduced-motion: reduce) {
      * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; }
    }

    @media (max-width: 420px) {
      .email-row { flex-direction: column; }
      .btn { padding: 0.85rem; width: 100%; }
    }
  </style>
</head>
<body>

<div class="flag" aria-hidden="true">
  <span></span><span></span><span></span><span></span><span></span>
</div>

<div class="page">

  <!-- Island -->
  <svg class="island" viewBox="0 0 180 256" fill="none" aria-hidden="true">
    <defs>
      <radialGradient id="ig" cx="72" cy="110" r="105" gradientUnits="userSpaceOnUse">
        <stop offset="0%"   stop-color="#2E4418"/>
        <stop offset="40%"  stop-color="#1A2C0C"/>
        <stop offset="100%" stop-color="#0C1606"/>
      </radialGradient>
      <filter id="gl" x="-50%" y="-50%" width="200%" height="200%">
        <feGaussianBlur in="SourceGraphic" stdDeviation="4"  result="b1"/>
        <feGaussianBlur in="SourceGraphic" stdDeviation="10" result="b2"/>
        <feMerge><feMergeNode in="b2"/><feMergeNode in="b1"/><feMergeNode in="SourceGraphic"/></feMerge>
      </filter>
    </defs>
    <path d="M 20 186 C 24 206,38 226,53 238 C 66 246,80 250,96 250 C 118 244,140 232,155 218 C 166 204,169 188,167 174 C 164 158,158 144,151 132 C 140 116,132 100,125 85 C 118 68,106 56,94 43 C 94 40,93 30,87 22 C 75 10,60 4,51 8 C 44 10,36 18,33 28 C 30 38,28 50,26 60 C 22 74,20 96,18 120 C 16 142,16 166,20 186 Z"
          fill="url(#ig)"/>
    <path d="M 20 186 C 24 206,38 226,53 238 C 66 246,80 250,96 250 C 118 244,140 232,155 218 C 166 204,169 188,167 174 C 164 158,158 144,151 132 C 140 116,132 100,125 85 C 118 68,106 56,94 43 C 94 40,93 30,87 22 C 75 10,60 4,51 8 C 44 10,36 18,33 28 C 30 38,28 50,26 60 C 22 74,20 96,18 120 C 16 142,16 166,20 186 Z"
          stroke="#8D153A" stroke-width="1.8" fill="none" filter="url(#gl)"/>
  </svg>

  <!-- Headline -->
  <h1 class="hl">July 1.<br/><span style="color:var(--crimson)">1,400km.</span></h1>

  <!-- Sub -->
  <p class="sub">I'm running a full lap of Sri Lanka.</p>
  <p class="sub-muted">Follow it from day one.</p>

  <!-- Countdown -->
  <div class="cd">
    <span class="cd-n" id="cd-d">--</span><span class="cd-l">d</span>
    <span class="cd-dot">·</span>
    <span class="cd-n" id="cd-h">--</span><span class="cd-l">h</span>
    <span class="cd-dot">·</span>
    <span class="cd-n" id="cd-m">--</span><span class="cd-l">m</span>
    <span class="cd-dot">·</span>
    <span class="cd-n" id="cd-s">--</span><span class="cd-l">s</span>
  </div>

  <!-- Form -->
  <div class="form-wrap">
    <form id="form" novalidate>
      <div class="email-row-wrap">
        <div class="email-row">
          <label for="em" style="position:absolute;opacity:0;pointer-events:none;">Email</label>
          <input id="em" class="email-input" type="email" placeholder="your@email.com"
                 required autocomplete="email" />
          <button type="submit" class="btn">I'M IN</button>
        </div>
      </div>
      <p class="form-error" id="err" aria-live="polite"></p>
      <p class="form-note">No spam. Just the run.</p>
    </form>

    <div class="success" id="success">
      <p class="success-hl">You're in.</p>
      <p class="success-sub">I'll write from the road.<br/>Everything from day one.</p>
    </div>
  </div>

  <!-- Links -->
  <div class="links">
    <a href="https://instagram.com/sash.jm" target="_blank" rel="noopener noreferrer">@sash.jm</a>
    <a href="https://givestar.io/gs/the-voice-i-wish-i-had-a-lap-of-sri-lanka"
       target="_blank" rel="noopener noreferrer">Support the run →</a>
  </div>

</div>

<script>
  /* Countdown */
  const target = new Date('2026-07-01T00:00:00+05:30');
  const pad = n => String(Math.floor(n)).padStart(2,'0');
  (function tick() {
    const d = target - Date.now();
    if (d <= 0) return;
    document.getElementById('cd-d').textContent = pad(d / 86400000);
    document.getElementById('cd-h').textContent = pad((d % 86400000) / 3600000);
    document.getElementById('cd-m').textContent = pad((d % 3600000) / 60000);
    document.getElementById('cd-s').textContent = pad((d % 60000) / 1000);
    setTimeout(tick, 1000);
  })();

  /* Form */
  document.getElementById('form').addEventListener('submit', async e => {
    e.preventDefault();
    const btn = e.target.querySelector('.btn');
    const email = document.getElementById('em').value.trim();
    const err = document.getElementById('err');

    if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) {
      err.textContent = 'Enter a valid email address.';
      return;
    }

    err.textContent = '';
    btn.textContent = '...';
    btn.disabled = true;

    try {
      const res = await fetch('https://api.convertkit.com/v3/forms/9353779/subscribe', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ api_key: 'aqaYfs33X9Kwc5fG_0CXug', email })
      });
      const data = await res.json();
      if (res.ok && data.subscription) {
        e.target.querySelector('.email-row-wrap').classList.add('hide');
        document.getElementById('success').classList.add('show');
      } else { throw new Error(); }
    } catch {
      err.textContent = 'Something went wrong. Try again.';
      btn.textContent = "I'M IN";
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
